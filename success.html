<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>報名完成</title>
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>
    <main class="page-shell">
      <section class="soft-card success-card">
        <p class="eyebrow">Registration Complete</p>
        <h1 id="successTitle">報名完成</h1>
        <p id="successDescription" class="hero-text">請確認以下報名資料是否正確；若需要調整，可直接修改後送出。</p>

        <div id="successMessage" class="message" hidden></div>
        <div id="successToast" class="success-toast" hidden>報名資料已成功修改並送出。</div>

        <section id="registrationConfirmPanel" class="confirm-panel" hidden>
          <aside id="confirmMeetingSummary" class="meeting-confirm-card"></aside>

          <form id="confirmForm" class="app-form confirm-form">
            <input name="attendee_count" type="hidden" value="1">
            <textarea name="guest_names" hidden></textarea>

            <div class="form-row">
              <label>
                邀請人
                <input name="inviter_name" type="text" autocomplete="name" required>
              </label>
              <label>
                會所
                <select name="hall" required>
                  <option value="">請選擇會所</option>
                  <option value="38 會所">38 會所</option>
                </select>
              </label>
            </div>

            <label>
              區
              <select name="district" required>
                <option value="">請選擇區</option>
              </select>
            </label>

            <div class="meal-attendee-line">
              <label class="checkbox-card">
                <input name="meal_required" type="checkbox">
                <span>
                  <strong>需要用餐</strong>
                  <small>勾選後填寫葷食與素食數量</small>
                </span>
              </label>
            </div>

            <div id="mealFields" class="form-row two meal-fields" hidden>
              <label>
                葷食數量
                <input name="meat_meal_count" type="number" min="0" inputmode="numeric">
              </label>
              <label>
                素食數量
                <input name="vegetarian_meal_count" type="number" min="0" inputmode="numeric">
              </label>
            </div>

            <section class="guest-editor">
              <div class="guest-editor-heading">
                <label>受邀人</label>
                <button id="addGuest" class="secondary-button icon-button" type="button" aria-label="新增受邀人">+</button>
              </div>
              <div id="guestList" class="guest-list"></div>
              <p id="attendeeCountHint" class="hint">目前報名人數：1 人</p>
            </section>

            <label>
              備註
              <textarea name="note" rows="3"></textarea>
            </label>

            <p class="hint">提醒：報名人數會依邀請人與受邀人數量自動計算；若需要用餐，葷食數量 + 素食數量需等於報名人數。</p>

            <div class="button-row confirm-actions">
              <button id="confirmBackHome" class="secondary-button" type="button">確認無誤，回報名首頁</button>
              <button id="updateFromSuccess" class="primary-button" type="submit">修改送出</button>
            </div>
          </form>
        </section>
      </section>
    </main>

    <script src="js/locationOptions.js?v=20260611-5"></script>
    <script src="js/mealToggle.js?v=20260611-1"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js?v=20260611-2"></script>
    <script src="js/supabaseClient.js?v=20260611-3"></script>
    <script src="js/utils.js"></script>
    <script src="js/success.js?v=20260611-4"></script>
  </body>
</html>
