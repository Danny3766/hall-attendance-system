<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>報名完成</title>
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>
    <main class="page-shell">
      <section class="soft-card success-card">
        <p class="eyebrow">Registration Complete</p>
        <h1 id="successTitle">報名完成</h1>
        <p id="successDescription" class="hero-text">請確認以下報名資料是否正確；若需要調整，請前往修改報名資料頁。</p>

        <div id="successMessage" class="message" hidden></div>

        <section id="registrationConfirmPanel" class="confirm-panel" hidden>
          <aside id="confirmMeetingSummary" class="meeting-confirm-card"></aside>

          <div class="confirm-details" aria-label="報名資料">
            <dl class="detail-list">
              <div class="identity-detail"><dt>邀請人</dt><dd id="confirmInviterName"></dd></div>
              <div class="identity-detail"><dt>會所</dt><dd id="confirmHall"></dd></div>
              <div class="identity-detail"><dt>區</dt><dd id="confirmDistrict"></dd></div>
              <div class="meal-detail"><dt>是否用餐</dt><dd id="confirmMealRequired"></dd></div>
              <div class="meal-detail meal-count-detail"><dt>餐點數量</dt><dd id="confirmMealCounts"></dd></div>
              <div class="count-detail"><dt>報名總人數</dt><dd id="confirmAttendeeCount"></dd></div>
              <div class="guest-detail"><dt>受邀人</dt><dd id="confirmGuestNames"></dd></div>
              <div class="wide-detail"><dt>備註</dt><dd id="confirmNote"></dd></div>
            </dl>
          </div>

          <div class="button-row confirm-actions">
            <button id="confirmBackHome" class="secondary-button" type="button">確認無誤，回報名首頁</button>
            <button id="editRegistration" class="primary-button" type="button">修改報名資料</button>
          </div>
        </section>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js?v=20260611-2"></script>
    <script src="js/supabaseClient.js?v=20260611-3"></script>
    <script src="js/utils.js?v=20260613-1"></script>
    <script src="js/success.js?v=20260613-2"></script>
  </body>
</html>
