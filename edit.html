<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>修改報名資料</title>
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>
    <main class="page-shell">
      <section class="hero compact">
        <div>
          <p class="eyebrow">Edit Registration</p>
          <h1>修改報名資料</h1>
          <p class="hero-text">修改後會更新原本的報名資料，不會新增一筆報名。</p>
        </div>
      </section>

      <section class="content-grid">
        <aside id="meetingSummary" class="soft-card meeting-card">
          <p>正在載入聚會資料...</p>
        </aside>

        <section class="soft-card form-card">
          <form id="editForm" class="app-form">
            <div class="form-row">
              <label>
                邀請人
                <input name="inviter_name" type="text" autocomplete="name" required>
              </label>
              <label>
                會所
                <select name="hall" required>
                  <option value="">請選擇會所</option>
                  <option value="38 會所">38 會所</option>
                </select>
              </label>
            </div>

            <label>
              區
              <select name="district" required>
                <option value="">請選擇區</option>
              </select>
            </label>

            <div class="meal-attendee-line">
              <label class="checkbox-card">
                <input name="meal_required" type="checkbox">
                <span>
                  <strong>需要用餐</strong>
                  <small>勾選後填寫葷食與素食數量</small>
                </span>
              </label>

              <div class="attendee-row">
                <label>
                  報名人數
                  <input name="attendee_count" type="number" min="1" inputmode="numeric" required>
                </label>
              </div>
            </div>

            <div id="mealFields" class="form-row two meal-fields" hidden>
              <label>
                葷食數量
                <input name="meat_meal_count" type="number" min="0" inputmode="numeric">
              </label>
              <label>
                素食數量
                <input name="vegetarian_meal_count" type="number" min="0" inputmode="numeric">
              </label>
            </div>

            <label>
              受邀人姓名
              <textarea name="guest_names" rows="3"></textarea>
            </label>

            <label>
              備註
              <textarea name="note" rows="3"></textarea>
            </label>

            <p class="hint">提醒：若需要用餐，葷食數量 + 素食數量需等於報名人數。</p>
            <div id="editMessage" class="message" hidden></div>
            <button id="saveButton" class="primary-button" type="submit">儲存修改</button>
          </form>
        </section>
      </section>
    </main>

    <script src="js/locationOptions.js?v=20260611-5"></script>
    <script src="js/mealToggle.js?v=20260611-1"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/supabaseClient.js?v=20260611-3"></script>
    <script src="js/utils.js?v=20260611-3"></script>
    <script src="js/edit.js?v=20260611-3"></script>
  </body>
</html>
