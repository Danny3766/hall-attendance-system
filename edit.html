<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>前往報名確認頁</title>
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>
    <main class="page-shell narrow">
      <section class="soft-card success-card">
        <p class="eyebrow">Redirecting</p>
        <h1>前往報名確認頁</h1>
        <p class="hero-text">系統已更新修改流程，正在帶您前往報名確認頁。</p>
        <div id="redirectMessage" class="message info">請稍候...</div>
        <div class="button-row">
          <a id="manualRedirect" class="primary-button" href="success.html">前往報名確認頁</a>
          <a class="ghost-link" href="index.html">回到報名頁</a>
        </div>
      </section>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const target = new URL("success.html", window.location.href);
      const id = params.get("id");
      const token = params.get("token");

      if (id) target.searchParams.set("id", id);
      if (token) target.searchParams.set("token", token);

      document.getElementById("manualRedirect").href = target.toString();
      window.location.replace(target.toString());
    </script>
  </body>
</html>
