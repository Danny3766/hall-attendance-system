<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>聚會報名</title>
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>
    <main class="page-shell">
      <section class="hero">
        <div>
          <p class="eyebrow">Meeting Registration</p>
          <h1>聚會報名</h1>
          <p class="hero-text">歡迎弟兄姊妹一同有分聚集。請填寫報名資料；若之後需要調整，可回到本頁查詢既有報名並修改。</p>
        </div>
      </section>

      <section class="content-grid">
        <aside id="meetingSummary" class="soft-card meeting-card">
          <p>正在載入聚會資料...</p>
        </aside>

        <section class="soft-card form-card">
          <div class="section-heading">
            <p class="eyebrow">Register</p>
            <h2>填寫報名資料</h2>
          </div>

          <section class="lookup-card">
            <div>
              <h3>已報名過？</h3>
              <p>輸入邀請人、會所與區，若已有報名資料，可直接前往修改。</p>
            </div>
            <form id="lookupForm" class="lookup-form">
              <label>
                邀請人
                <input name="inviter_name" type="text" autocomplete="name" required>
              </label>
              <label>
                會所
                <select name="hall" required>
                  <option value="">請選擇會所</option>
                </select>
              </label>
              <label>
                區
                <select name="district" required>
                  <option value="">請選擇區</option>
                </select>
              </label>
              <button id="lookupButton" class="secondary-button" type="submit">查詢報名</button>
            </form>
            <div id="lookupMessage" class="message" hidden></div>
          </section>

          <form id="registrationForm" class="app-form">
            <input id="meeting_id" name="meeting_id" type="hidden" required>
            <input name="attendee_count" type="hidden" value="1">
            <textarea name="guest_names" hidden></textarea>

            <div class="form-row three">
              <label>
                邀請人
                <input name="inviter_name" type="text" autocomplete="name" required>
              </label>
              <label>
                會所
                <select name="hall" required>
                  <option value="">請選擇會所</option>
                </select>
              </label>
              <label>
                區
                <select name="district" required>
                  <option value="">請選擇區</option>
                </select>
              </label>
            </div>

            <input name="meal_required" type="checkbox" hidden>
            <input name="meat_meal_count" type="number" min="0" value="0" hidden>
            <input name="vegetarian_meal_count" type="number" min="0" value="0" hidden>

            <section class="meal-selector">
              <div class="meal-summary-row">
                <label class="checkbox-card compact-checkbox meal-toggle-card">
                  <input id="inviterMealToggle" type="checkbox">
                  <span>
                    <strong>需要用餐</strong>
                    <small>勾選後選擇葷食或素食</small>
                  </span>
                </label>

                <div id="inviterMealType" class="diet-choice-group" hidden>
                  <label class="option-chip">
                    <input name="inviter_meal_type" type="radio" value="meat">
                    <span>葷食</span>
                  </label>
                  <label class="option-chip">
                    <input name="inviter_meal_type" type="radio" value="vegetarian">
                    <span>素食</span>
                  </label>
                </div>
              </div>
            </section>

            <section class="guest-editor">
              <div class="guest-editor-heading">
                <label>受邀人</label>
                <button id="addRegistrationGuest" class="secondary-button icon-button" type="button" aria-label="新增受邀人">+</button>
              </div>
              <div id="registrationGuestList" class="guest-list"></div>
              <div class="guest-summary-line">
                <p id="registrationAttendeeCountHint" class="hint" hidden>目前報名人數：1 人</p>
                <div class="meal-count-summary hint" aria-live="polite" hidden>
                  <span class="meal-count-text">葷食 <strong id="meatMealCountDisplay">0</strong> 份</span>
                  <span class="meal-count-text">素食 <strong id="vegetarianMealCountDisplay">0</strong> 份</span>
                </div>
              </div>
            </section>

            <label>
              備註
              <textarea name="note" rows="3" placeholder="其他需要服事者知道的事項"></textarea>
            </label>

            <p class="hint">提醒：報名人數會依邀請人與受邀人數量自動計算；餐點數量會依每位勾選的用餐與葷素別自動統計。</p>
            <div id="formMessage" class="message" hidden></div>
            <button id="submitButton" class="primary-button" type="submit">送出報名</button>
          </form>
        </section>
      </section>
    </main>

    <script src="js/locationOptions.js?v=20260618-1"></script>
    <script src="js/mealToggle.js?v=20260611-1"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js?v=20260611-2"></script>
    <script src="js/supabaseClient.js?v=20260611-3"></script>
    <script src="js/utils.js?v=20260613-1"></script>
    <script src="js/register.js?v=20260611-9"></script>
  </body>
</html>
